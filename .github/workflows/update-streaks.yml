name: Update Daily Streak Card

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches: [main, work]

permissions:
  contents: write

concurrency:
  group: daily-streaks-update
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Prepare cache key
        run: echo "CACHE_DATE=$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Restore API cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/daily-streak
          key: daily-streak-${{ vars.STREAK_USERNAME }}-${{ env.CACHE_DATE }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            daily-streak-${{ vars.STREAK_USERNAME }}-${{ env.CACHE_DATE }}-
            daily-streak-${{ vars.STREAK_USERNAME }}-

      - name: Generate streak SVG
        env:
          STREAK_USERNAME: ${{ vars.STREAK_USERNAME }}
          STREAK_TIMEZONE_OFFSET: ${{ vars.STREAK_TIMEZONE_OFFSET }}
          STREAK_MAX_PAGES: ${{ vars.STREAK_MAX_PAGES }}
          STREAK_LOOKBACK_DAYS: ${{ vars.STREAK_LOOKBACK_DAYS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$STREAK_USERNAME" ]; then
            echo "Missing repository variable: STREAK_USERNAME"
            exit 1
          fi

          python3 src/daily_streak \
            --username "$STREAK_USERNAME" \
            --timezone-offset "${STREAK_TIMEZONE_OFFSET:-0}" \
            --max-pages "${STREAK_MAX_PAGES:-5}" \
            --lookback-days "${STREAK_LOOKBACK_DAYS:-45}" \
            --cache-file .cache/daily-streak/history.json \
            --output assets/github-streak.svg

      - name: Save API cache
        uses: actions/cache/save@v4
        with:
          path: .cache/daily-streak
          key: daily-streak-${{ vars.STREAK_USERNAME }}-${{ env.CACHE_DATE }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add --intent-to-add assets/github-streak.svg
          if git diff --quiet -- assets/github-streak.svg && git diff --cached --quiet -- assets/github-streak.svg; then
            echo "No changes detected"
            exit 0
          fi

          git add assets/github-streak.svg
          git commit -m "chore: update DailyStreaks card"
          git push
